name: seasame_assist_pro
description: "SEASAME Assist-Pro — Smart University Ticketing Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4
  http: ^1.2.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Localization
  intl: ^0.20.2

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

  # File handling
  file_picker: ^8.3.7
  url_launcher: ^6.3.1

  # Local storage
  shared_preferences: ^2.3.5

  # Icons
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.2
  lucide_icons: ^0.257.0
  fl_chart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true

